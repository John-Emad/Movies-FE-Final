<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Details</title>
    <!-- Bootstrap CSS -->
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/Movies-FE-Final/CSS/style.css">
    <link rel="stylesheet" href="/Movies-FE-Final/CSS/seriesStyles.css">

    <link rel="stylesheet" href="/Movies-FE-Final/assets/bootstrap/css/bootstrap.min.css">
</head>
<body>
    <!-- Back Button -->
    <button class="btn btn-outline-light back-button" id="back-button">
        <i class="fas fa-arrow-left me-2"></i>Back
    </button>

    <!-- Backdrop Image -->
    <div class="series-backdrop-container">
        <img id="series-backdrop" class="series-backdrop" src="" alt="">
    </div>

    <!-- Main Content -->
    <div class="container series-details-container">
        <div class="row g-4">
            <div class="col-12 col-md-4">
                <div class="series-poster-container text-center">
                    <img id="series-poster" class="series-poster img-fluid w-100" src="" alt="Series Poster">
                    <div class="mt-3 d-flex justify-content-center gap-2">
                        <span id="series-status" class="badge bg-primary"></span>
                        <span id="series-type" class="badge bg-secondary"></span>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-8">
                <div class="series-info">
                    <h1 id="series-title" class="mb-3"></h1>
                    <p id="series-tagline" class="text-muted fs-5 fst-italic mb-4"></p>
                    
                    <!-- Rating and Metadata -->
                    <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                        <span id="series-rating" class="badge bg-warning text-dark fs-6 p-2">
                            <i class="fas fa-star me-1"></i><span id="rating-value"></span>
                        </span>
                        <span id="series-first-air-date" class="text-muted"></span>
                        <span id="series-last-air-date" class="text-muted"></span>
                    </div>
                    
                    <!-- Genres -->
                    <div id="series-genres" class="mb-4"></div>
                    
                    <!-- Overview Card -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body">
                            <h3 class="card-title">Overview</h3>
                            <p id="series-overview" class="card-text"></p>
                        </div>
                    </div>
                    
                    <!-- Details and Production Cards -->
                    <div class="row g-4 mb-4">
                        <div class="col-12 col-lg-6">
                            <div class="card h-100 border-0 shadow-sm">
                                <div class="card-body">
                                    <h5 class="card-title">Details</h5>
                                    <ul class="list-group list-group-flush">
                                        <li class="list-group-item bg-transparent"><strong>Original Name:</strong> <span id="series-original-name"></span></li>
                                        <li class="list-group-item bg-transparent"><strong>Episodes:</strong> <span id="series-episode-count"></span></li>
                                        <li class="list-group-item bg-transparent"><strong>Seasons:</strong> <span id="series-season-count"></span></li>
                                        <li class="list-group-item bg-transparent"><strong>Status:</strong> <span id="series-status-text"></span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-12 col-lg-6">
                            <div class="card h-100 border-0 shadow-sm">
                                <div class="card-body">
                                    <h5 class="card-title">Production</h5>
                                    <ul class="list-group list-group-flush">
                                        <li class="list-group-item bg-transparent"><strong>Networks:</strong> <span id="series-networks"></span></li>
                                        <li class="list-group-item bg-transparent"><strong>Countries:</strong> <span id="series-production-countries"></span></li>
                                        <li class="list-group-item bg-transparent"><strong>Languages:</strong> <span id="series-spoken-languages"></span></li>
                                        <li class="list-group-item bg-transparent"><strong>Homepage:</strong> <span id="series-homepage"></span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Seasons Section -->
        <h3 class="mt-5 mb-4">Seasons</h3>
        <div id="series-seasons" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your Scripts -->
    <script>
        // Back button functionality
        document.getElementById('back-button').addEventListener('click', () => {
            window.history.back();
        });
    </script>
    <script type="module" src="../../Scripts/dist/seriesDetails.js"></script>
</body>
</html>

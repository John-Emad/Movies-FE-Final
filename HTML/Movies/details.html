<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Movies-FE-Final/CSS/style.css">
    <link rel="stylesheet" href="/Movies-FE-Final/CSS/moviesStyles.css">
    <link rel="stylesheet" href="/Movies-FE-Final/assets/bootstrap/css/bootstrap.min.css">
    <title>Movie Details</title>
</head>
<body>
    <!-- Back Button -->
    <button class="btn btn-outline-light back-button" id="back-button">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <!-- Backdrop Image -->
    <div class="backdrop-container">
        <img id="movie-backdrop" class="backdrop-image" alt="Movie backdrop">
    </div>

    <!-- Main Content Container -->
    <div class="container movie-details-container">
        <div class="row">
            <!-- Poster Column -->
            <div class="col-md-4 mb-4">
                <div class="movie-poster-container text-center">
                    <img id="movie-poster" class="movie-poster img-fluid" src="" alt="Movie Poster">
                </div>
            </div>
            
            <!-- Details Column -->
            <div class="col-md-8">
                <div class="movie-info">
                    <h1 id="movie-title"></h1>
                    <p id="movie-tagline" class="text-muted fs-5 fst-italic"></p>
                    
                    <div class="movie-meta d-flex align-items-center flex-wrap gap-3 mb-3">
                        <span id="movie-rating" class="badge bg-warning text-dark">
                            <i class="fas fa-star"></i> <span id="rating-value"></span>
                        </span>
                        <span id="movie-runtime"></span>
                        <span id="movie-release-date"></span>
                        <span id="movie-status" class="badge bg-info"></span>
                        <span id="movie-popularity" class="badge bg-secondary">
                            <i class="fas fa-chart-line"></i> <span id="popularity-value"></span>
                        </span>
                        <span id="movie-vote-count" class="badge bg-light text-dark">
                            <i class="fas fa-users"></i> <span id="vote-count-value"></span>
                        </span>
                        <span id="movie-adult" class="badge bg-danger" style="display: none;">
                            <i class="fas fa-exclamation-triangle"></i> Adult
                        </span>
                    </div>
                    
                    <div id="movie-genres" class="my-2"></div>
                    
                    <div class="card bg-dark text-white mb-4">
                        <div class="card-body">
                            <h3 class="card-title">Overview</h3>
                            <p id="movie-overview" class="card-text"></p>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <div class="card bg-dark text-white h-100">
                                <div class="card-body">
                                    <h5 class="card-title">Details</h5>
                                    <p><strong>Original Title:</strong> <span id="movie-original-title"></span></p>
                                    <p><strong>Original Language:</strong> <span id="movie-original-language"></span></p>
                                    <p><strong>IMDB ID:</strong> <span id="movie-imdb-id"></span></p>
                                    <p><strong>Homepage:</strong> <span id="movie-homepage"></span></p>
                                    <p><strong>Collection:</strong> <span id="movie-collection"></span></p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <div class="card bg-dark text-white h-100">
                                <div class="card-body">
                                    <h5 class="card-title">Production</h5>
                                    <p><strong>Countries:</strong> <span id="movie-production-countries"></span></p>
                                    <p><strong>Languages:</strong> <span id="movie-spoken-languages"></span></p>
                                    <p><strong>Budget:</strong> <span id="movie-budget"></span></p>
                                    <p><strong>Revenue:</strong> <span id="movie-revenue"></span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <h3 class="mt-4">Production Companies</h3>
                    <div id="movie-companies" class="d-flex flex-wrap gap-3 mb-5"></div>
                </div>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="alert alert-danger position-fixed top-0 start-50 translate-middle-x mt-3" style="display: none;"></div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your Script -->
    <script type="module" src="../../Scripts/dist/moviesOperations.js"></script>
    <script type="module" src="../../Scripts/dist/movieDetails.js"></script>


    <script>
        // Back button functionality
        document.getElementById('back-button').addEventListener('click', () => {
            window.history.back();
        });

        // Format currency
        function formatCurrency(amount) {
            return amount ? '$' + amount.toLocaleString() : 'Not available';
        }

        // Format runtime
        function formatRuntime(minutes) {
            if (!minutes) return 'N/A';
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours}h ${mins}m`;
        }
    </script>
</body>
</html>

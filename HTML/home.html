<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & Series Hub</title>
    <!-- Bootstrap CSS -->
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/Movies-FE-Final/CSS/style.css">
    <link rel="stylesheet" href="/Movies-FE-Final/assets/bootstrap/css/bootstrap.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand">
        <div class="container">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link text-black" href="home.html">Entertainment hub</a>
            </li>
                <li class="nav-item">
                    <a class="nav-link text-black" href="Movies/popularMovies.html">Movies</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-black" href="./Series/popularSeries.html">TV Series</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Loading Spinner -->
    <div class="loading-spinner spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>

    <!-- Content Container -->
    <div class="container content-container">
        <!-- Movies Section -->
        <section id="movies-section">
            <h2 class="section-title">Top Rated Movies</h2>
            <div id="movies-content" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
                <!-- Movies will be loaded here -->
            </div>
        </section>

        <!-- Series Section -->
        <section id="series-section" class="mt-5">
            <h2 class="section-title">Top Rated TV Series</h2>
            <div id="series-content" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
                <!-- Series will be loaded here -->
            </div>
        </section>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../Scripts/dist/home.js"></script>
</body>
</html>
